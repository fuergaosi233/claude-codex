name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # `npm install` (not `npm ci`): the runtime SDK ships per-platform native
      # binaries as optionalDependencies, and a lockfile generated on one OS
      # omits the others, so `npm ci` fails on the Linux runner.
      - run: npm install --no-audit --no-fund
      - run: npm run check       # biome format + lint
      - run: npm run typecheck   # tsc --noEmit
      - run: npm test            # build + node --test (Node 24 has stable node:sqlite)
